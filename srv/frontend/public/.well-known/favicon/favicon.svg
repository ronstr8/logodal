<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c"><rect width="100" height="100" rx="14"/></clipPath>
  </defs>
  <!-- Shadow -->
  <rect x="4" y="6" width="100" height="100" rx="14" fill="#5A3008" opacity="0.18"/>
  <!-- Tile body -->
  <rect width="100" height="100" rx="14" fill="#CC904C"/>
  <!-- Diagonal grain -->
  <g clip-path="url(#c)" stroke="#7A4C10" stroke-width="16" opacity="0.14">
    <line x1="-40" y1="0" x2="100" y2="140"/>
    <line x1="-20" y1="0" x2="120" y2="140"/>
    <line x1="0"   y1="0" x2="140" y2="140"/>
    <line x1="20"  y1="0" x2="160" y2="140"/>
    <line x1="40"  y1="0" x2="180" y2="140"/>
    <line x1="60"  y1="0" x2="200" y2="140"/>
  </g>
  <!-- Top highlight -->
  <rect x="2" y="2" width="96" height="5" rx="2" fill="#F0C07A" opacity="0.5" clip-path="url(#c)"/>
  <!-- Border -->
  <rect x="1" y="1" width="98" height="98" rx="13" fill="none" stroke="#8A5C18" stroke-width="1.5"/>
  <!-- Lambda -->
  <text x="50" y="80" font-size="82" font-weight="700" text-anchor="middle"
        fill="#2C1000" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">λ</text>
  <!-- Question mark -->
  <text x="97" y="92" font-size="26" font-weight="700" text-anchor="end"
        fill="#2C1000" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">?</text>
</svg>
