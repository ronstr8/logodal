<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- tile depth shadow -->
  <rect x="10" y="12" width="80" height="80" rx="12" ry="12" fill="rgba(0,0,0,0.45)"/>
  <!-- tile face -->
  <rect x="8" y="8" width="80" height="80" rx="12" ry="12" fill="#1a1a2e"/>
  <!-- tile border -->
  <rect x="8" y="8" width="80" height="80" rx="12" ry="12" fill="none" stroke="#ffd700" stroke-width="2.5" opacity="0.55"/>
  <!-- W -->
  <text x="48" y="72" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="bold" fill="#ffd700" text-anchor="middle">W</text>
  <!-- point value -->
  <text x="77" y="84" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#ffd700" opacity="0.55" text-anchor="middle">4</text>
</svg>
