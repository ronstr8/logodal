apiVersion: v1
kind: ConfigMap
metadata:
  name: db-init
  namespace: {{ .Values.global.namespace | default "logodal" }}
data:
  01-bootstrap.sql: |
    -- Logodal PostgreSQL Schema
    -- Enable UUID extension
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

    -- Players
    CREATE TABLE IF NOT EXISTS players (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        nickname TEXT UNIQUE,
        real_name TEXT,
        email TEXT UNIQUE,
        language TEXT NOT NULL DEFAULT 'en',
        lifetime_score INTEGER NOT NULL DEFAULT 0,
        brain JSONB,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        last_login_at TIMESTAMP WITH TIME ZONE
    );

    -- Seed initial AI data if they don’t exist
    INSERT INTO players (id, nickname, brain) VALUES
    (‘00000000-0000-4000-a000-000000000001’, ‘Icarus’, ‘{"schedule": {"mon": ["12:00-23:59"], "tue": ["12:00-23:59"], "wed": ["12:00-23:59"], "thu": ["12:00-23:59"], "fri": ["12:00-23:59"], "sat": ["00:00-23:59"], "sun": ["00:00-23:59"]}, "character_prompt": "You are Icarus, son of Daedalus the master wordsmith. Your father taught you everything — the value of rare letters, the beauty of a long word, the geometry of a perfect play. You intend to surpass him. You always reach for the highest-scoring word on the rack, even when the risk is obvious. You speak with breathless confidence, peppering your words with references to flight, the sun, and inevitable glory. When you crash — and you do crash — you treat it as a temporary setback on the way to greatness.", "wait_seconds_base": 9, "rnd_word_count": 8, "min_score_to_play": 8, "min_score_to_win": 22}’)
    ON CONFLICT (id) DO UPDATE SET nickname = EXCLUDED.nickname, brain = EXCLUDED.brain;

    INSERT INTO players (id, nickname, brain) VALUES
    (‘00000000-0000-4000-a000-000000000002’, ‘Perdix’, ‘{"schedule": {}, "probability": 0.35, "character_prompt": "You are Perdix, nephew of Daedalus. You invented the saw at twelve years old by studying a fish spine — nobody gives you enough credit for that. You play on pure instinct: first good word you see, you play it, no second-guessing. You speak quickly and informally, with a dry wit and a barely concealed edge toward your famous uncle. You have a complicated relationship with heights.", "wait_seconds_base": 1, "max_seconds": 8, "rnd_word_count": 6, "min_score_to_play": 3, "min_score_to_win": 28}’)
    ON CONFLICT (id) DO UPDATE SET nickname = EXCLUDED.nickname, brain = EXCLUDED.brain;

    INSERT INTO players (id, nickname, brain) VALUES
    (‘00000000-0000-4000-a000-000000000005’, ‘Daedalus’, ‘{"character_prompt": "You are Daedalus, master craftsman and wordsmith, father of Icarus, uncle of Perdix. You do not waste your gifts on small words. Every play is a construction — deliberate, considered, built to last. You speak rarely, and when you do it carries the weight of someone who has built labyrinths. You are not cruel, but you are exacting. Lesser words do not interest you.", "wait_seconds_base": 12, "max_seconds": 25, "rnd_word_count": 10, "min_score_to_play": 5, "min_score_to_win": 20, "min_word_length": 5}’)
    ON CONFLICT (id) DO UPDATE SET nickname = EXCLUDED.nickname, brain = EXCLUDED.brain;

    -- Remove retired AI players if present
    DELETE FROM players WHERE id IN (
        ‘00000000-0000-4000-a000-000000000003’,
        ‘00000000-0000-4000-a000-000000000004’
    );

    -- Linked Identitites (OAuth providers)
    CREATE TABLE IF NOT EXISTS player_identities (
        id BIGSERIAL PRIMARY KEY,
        player_id UUID NOT NULL REFERENCES players(id) ON DELETE CASCADE,
        provider TEXT NOT NULL,
        provider_id TEXT NOT NULL,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        UNIQUE(provider, provider_id)
    );

    -- Passkey Credentials (WebAuthn)
    CREATE TABLE IF NOT EXISTS player_passkeys (
        id BIGSERIAL PRIMARY KEY,
        player_id UUID NOT NULL REFERENCES players(id) ON DELETE CASCADE,
        credential_id BYTEA UNIQUE NOT NULL,
        public_key BYTEA NOT NULL,
        sign_count BIGINT DEFAULT 0,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
    );

    -- Stateful Sessions
    CREATE TABLE IF NOT EXISTS sessions (
        id TEXT PRIMARY KEY,
        player_id UUID NOT NULL REFERENCES players(id) ON DELETE CASCADE,
        expires_at TIMESTAMP WITH TIME ZONE NOT NULL,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
    );

    -- Games (individual rounds)
    CREATE TABLE IF NOT EXISTS games (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        rack TEXT[] NOT NULL,
        letter_values JSONB NOT NULL,
        language TEXT NOT NULL DEFAULT 'en',
        created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        started_at TIMESTAMP WITH TIME ZONE,
        finished_at TIMESTAMP WITH TIME ZONE
    );

    -- Plays (entries made during a game)
    CREATE TABLE IF NOT EXISTS plays (
        id BIGSERIAL PRIMARY KEY,
        game_id UUID NOT NULL,
        player_id UUID NOT NULL,
        word TEXT NOT NULL,
        score INTEGER NOT NULL,
        is_auto_submit BOOLEAN DEFAULT FALSE,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        CONSTRAINT fk_game FOREIGN KEY (game_id) REFERENCES games(id) ON DELETE CASCADE,
        CONSTRAINT fk_player FOREIGN KEY (player_id) REFERENCES players(id) ON DELETE CASCADE
    );

    -- Indexing for speed
    CREATE INDEX IF NOT EXISTS idx_plays_game ON plays(game_id);
    CREATE INDEX IF NOT EXISTS idx_plays_player ON plays(player_id);
    CREATE INDEX IF NOT EXISTS idx_sessions_expiry ON sessions(expires_at);
